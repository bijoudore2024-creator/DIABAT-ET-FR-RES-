<style>
    :root {
        --bg: #eef4ec;
        --obsidian: #e8f3e9;
        --obsidian-2: #f8fbf6;
        --panel: #ffffff;
        --panel-2: #f3faf4;
        --line: #d7e8d9;
        --header-bg: #063a1f;
        --header-bg-2: #0f6b34;
        --header-line: #22c55e;
        --header-text: #f3fbf5;
        --header-text-muted: #dff5e6;
        --accent: #0fe95c;
        --accent-soft: #3cf58c;
        --accent-dim: #0e8f3c;
        --text: #0c1f14;
        --text-muted: #4c6357;
        --danger: #ff3b2f;
        --danger-bg: rgba(255,59,47,0.14);
        --warn: #ffa600;
        --warn-bg: rgba(255,166,0,0.18);
        --ok: #0eeb7c;
        --ok-bg: rgba(14,235,124,0.14);
        --blue: #2f7bff;
        --blue-bg: rgba(47,123,255,0.14);
        --teal: #00e0c0;
        --teal-bg: rgba(0,224,192,0.14);
        --purple: #a259ff;
        --purple-bg: rgba(162,89,255,0.14);
        --pink: #ff4fa3;
        --pink-bg: rgba(255,79,163,0.14);
        --amber: #ffb020;
        --amber-bg: rgba(255,176,32,0.16);
        --cyan: #00c2ff;
        --cyan-bg: rgba(0,194,255,0.14);
        /* Couleurs de section (groupes de la sidebar) */
        --sec-dashboard: #16c150;
        --sec-stock: var(--blue);
        --sec-activite: var(--purple);
        --sec-appro: var(--amber);
        --sec-pharmacie: var(--teal);
        --sec-gestion: var(--pink);
        --sec-systeme: #8a94a6;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    ::selection { background: rgba(22,193,80,0.28); color: var(--text); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent-soft), var(--teal)); border-radius: 8px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Ripple effect for buttons */
    .btn, button { position: relative; overflow: hidden; }
    .btn .ripple, button .ripple {
        position: absolute; border-radius: 50%; transform: scale(0);
        background: rgba(255,255,255,0.55); pointer-events: none;
        animation: rippleAnim 0.6s ease-out;
    }
    @keyframes rippleAnim { to { transform: scale(2.8); opacity: 0; } }

    /* Scroll reveal */
    .reveal-init { opacity: 0; transform: translateY(14px); }
    .reveal-in { animation: revealIn 0.5s cubic-bezier(.2,.8,.3,1) forwards; }
    @keyframes revealIn { to { opacity: 1; transform: translateY(0); } }

    /* Skeleton shimmer for loading states */
    .skeleton {
        background: linear-gradient(90deg, rgba(22,193,80,0.08) 25%, rgba(22,193,80,0.18) 37%, rgba(22,193,80,0.08) 63%);
        background-size: 400% 100%;
        animation: shimmer 1.4s ease infinite;
        border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

    /* Connection status pill */
    #netStatusPill {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%) translateY(-60px);
        z-index: 900; padding: 8px 16px; border-radius: 999px;
        font-family: 'Work Sans', sans-serif; font-size: 0.8em; font-weight: 600;
        display: flex; align-items: center; gap: 8px;
        background: rgba(255,77,61,0.95); color: #fff;
        box-shadow: 0 10px 30px rgba(255,77,61,0.35);
        transition: transform 0.35s cubic-bezier(.2,.9,.3,1.2);
    }
    #netStatusPill.show { transform: translateX(-50%) translateY(0); }
    #netStatusPill.online { background: rgba(18,212,126,0.95); box-shadow: 0 10px 30px rgba(18,212,126,0.35); }
    #netStatusPill .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: pulseDot 1.4s infinite; }
    @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* General smoother, springier interactions app-wide */
    .btn, .sidebar-link, .icon-btn, .shortcut-chip { transition: all 0.18s cubic-bezier(.2,.8,.3,1.15); }
    .btn:hover { transform: translateY(-1px); }
    body {
        font-family: 'Work Sans', sans-serif;
        margin: 0;
        padding: 0;
        background: var(--bg);
        background-image:
            radial-gradient(circle at 15% 0%, rgba(22,193,80,0.12), transparent 45%),
            radial-gradient(circle at 85% 100%, rgba(0,194,168,0.10), transparent 40%),
            radial-gradient(circle at 50% 50%, rgba(46,139,255,0.04), transparent 60%);
        color: var(--text);
        min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Fraunces', serif; letter-spacing: 0.01em; font-weight: 600; font-optical-sizing: auto; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    header {
        background: linear-gradient(180deg, var(--header-bg-2), var(--header-bg));
        border-bottom: 1px solid var(--header-line);
        padding: 1.8rem 1.5rem 1.5rem;
        text-align: center;
        position: relative;
    }
    header::after {
        content: "";
        display: block;
        width: 90px;
        height: 2px;
        margin: 14px auto 0;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    header .mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px; height: 44px;
        border: 1.5px solid var(--accent-soft);
        border-radius: 50%;
        margin-bottom: 10px;
        color: var(--accent-soft);
        font-family: 'Fraunces', serif;
        font-size: 1.15em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 0 3px var(--header-bg), 0 0 0 4.5px rgba(34,139,34,0.35);
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    header .mark::before {
        content: "";
        position: absolute;
        inset: 4px;
        border: 1px dashed rgba(34,139,34,0.55);
        border-radius: 50%;
        pointer-events: none;
    }
    header .mark:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--header-bg), 0 0 0 4.5px rgba(34,139,34,0.6); }
    header .mark img { width: 100%; height: 100%; object-fit: cover; }
    header .mark::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(0,0,0,0.45);
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 0;
    }
    header .mark:hover::after { opacity: 1; }
    header .mark .mark-edit-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
        color: #fff;
        z-index: 2;
    }
    header .mark:hover .mark-edit-icon { opacity: 1; }
    header .mark .mark-edit-icon svg { width: 16px; height: 16px; }
    .header-bar {
        position: absolute;
        top: 1.6rem; left: 1.2rem; right: 1.2rem;
        display: flex; align-items: flex-start; justify-content: space-between;
        z-index: 10;
    }
    .icon-btn {
        background: none; border: none; cursor: pointer;
        color: var(--header-text-muted); padding: 6px; position: relative;
        display: inline-flex; align-items: center; justify-content: center;
        border-radius: 8px; transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--header-text); background: rgba(255,255,255,0.06); }
    .icon-btn svg { width: 22px; height: 22px; }
    .sidebar-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(6,7,9,0.6);
        z-index: 200;
    }
    .sidebar-overlay.open { display: block; }
    .app-sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 280px; max-width: 82vw;
        height: 100vh;
        background: linear-gradient(180deg, var(--header-bg-2), var(--header-bg));
        border-right: 1px solid var(--header-line);
        box-shadow: 8px 0 30px rgba(0,0,0,0.35);
        z-index: 201;

    .btn-success { background: linear-gradient(135deg, #2bffa0, var(--ok)); color: #03150c; border-bottom-color: #0d7a48; box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset, 0 6px 18px rgba(18,212,126,0.4); }

    .btn-success:active { box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 1px 4px rgba(18,212,126,0.35); }
    .btn-danger {
        background: transparent; color: var(--danger); border: 1px solid rgba(224,99,106,0.4);
        border-bottom: 1px solid rgba(224,99,106,0.4);
        padding: 5px 12px; font-size: 0.8em;
        box-shadow: none;
    }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-danger:active { transform: translateY(1px); }

    input, select {
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        width: 100%;
        margin: 8px 0;
        background: var(--obsidian-2);
        color: var(--text);
        font-family: 'Work Sans', sans-serif;
        font-size: 0.92em;
        box-shadow: inset 0 2px 4px rgba(30,30,20,0.08), inset 0 1px 0 rgba(0,0,0,0.02);
    }
    input::placeholder { color: var(--text-muted); }
    input:focus, select:focus { outline: none; border-color: var(--accent-dim); box-shadow: inset 0 2px 4px rgba(30,30,20,0.06), 0 0 0 3px rgba(34,139,34,0.12); }

    .alert {
        background: var(--warn-bg);
        color: var(--warn);
        border: 1px solid rgba(224,168,60,0.3);
        padding: 15px 18px;
        border-radius: 8px;
        margin: 18px 0 0;
        box-shadow: 0 4px 12px rgba(220,156,26,0.12);
    }
    .alert strong { color: var(--accent-soft); }
    .alert ul { padding-left: 20px; }

    .stat-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
    }
    .stat-card {
        background: linear-gradient(180deg, #ffffff, var(--panel-2));
        padding: 22px 18px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid var(--line);
        border-bottom: 3px solid #d8d4c2;
        box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 8px 20px rgba(30,30,20,0.09);
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 12px 26px rgba(30,30,20,0.13); }
    .stat-card h3 {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 2em;
        margin: 0 0 6px;
        color: var(--accent-soft);
        font-weight: 700;
        letter-spacing: 0;
    }
    .stat-card p { margin: 0; color: var(--text-muted); font-size: 0.85em; letter-spacing: 0.04em; text-transform: uppercase; }

    .caisse-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 25px; }
    @media (max-width: 800px) { .caisse-grid { grid-template-columns: 1fr; } }

    .suggestions {
        border: 1px solid var(--line); border-radius: 8px; max-height: 220px;
        overflow-y: auto; margin-top: -8px; background: var(--panel-2);
    }
    .suggestion-item {
        padding: 11px 12px; cursor: pointer; border-bottom: 1px solid var(--line);
        display: flex; justify-content: space-between; font-size: 0.9em;
    }
    .suggestion-item:hover { background: rgba(34,139,34,0.08); }
    .suggestion-item:last-child { border-bottom: none; }

    .browse-products-header {
        display: flex; align-items: center; justify-content: space-between;
        margin: 16px 0 8px;
    }
    .browse-products-header h4 { margin: 0; font-size: 0.95em; color: var(--text-muted); font-family: 'Work Sans', sans-serif; font-weight: 600; }
    #browseCategoryFilter { max-width: 180px; margin: 0; }
    .browse-products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
        max-height: 360px;
        overflow-y: auto;
        padding: 4px 2px;
    }
    .browse-product-card {
        background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
        padding: 10px; cursor: pointer; text-align: left;
        display: flex; flex-direction: column; gap: 6px;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    .browse-product-card:hover { border-color: var(--accent-soft); box-shadow: 0 3px 10px rgba(34,139,34,0.12); }
    .browse-product-card.out-of-stock { opacity: 0.5; cursor: not-allowed; }
    .browse-product-card .bpc-img {
        width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px;
        background: var(--panel-2); border: 1px solid var(--line);
    }
    .browse-product-card .bpc-img-placeholder {
        width: 100%; aspect-ratio: 1/1; border-radius: 6px;
        background: var(--panel-2); border: 1px solid var(--line);
        display: flex; align-items: center; justify-content: center;
        color: var(--text-muted); font-size: 1.4em; font-family: 'Fraunces', serif;
    }
    .browse-product-card .bpc-name { font-size: 0.82em; font-weight: 600; line-height: 1.25; }
    .browse-product-card .bpc-meta { font-size: 0.74em; color: var(--text-muted); display: flex; justify-content: space-between; }
    .browse-product-card .bpc-stock-low { color: var(--warn); }
    .browse-product-card .bpc-stock-out { color: var(--danger); }

    .cart-box {
        background: linear-gradient(180deg, #ffffff, var(--panel-2));
        border: 1px solid var(--line);
        border-bottom: 3px solid #d8d4c2;
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 20px rgba(30,30,20,0.09);
    }
    .cart-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 0; border-bottom: 1px solid var(--line);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item .qty-controls button {
        width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--line);
        background: var(--obsidian-2); color: var(--accent); cursor: pointer; font-weight: 700;
    }
    .cart-item .qty-controls button:hover { border-color: var(--accent-dim); }
    #total {
        font-family: 'IBM Plex Mono', monospace;
        color: var(--accent);
        border-top: 1px solid var(--line);
        padding-top: 14px;
        margin-top: 6px;
    }
    .empty-msg { color: var(--text-muted); font-style: italic; padding: 10px 0; }

    /* ---------- Tableau de bord (Accueil) — refonte "carnet d'officine" ---------- */
    .welcome-card {
        background:
            radial-gradient(ellipse 480px 220px at 88% -20%, rgba(34,139,34,0.10), transparent 70%),
            linear-gradient(180deg, var(--header-bg) 0%, #0d4527 62%, #0a3d22 100%);
        border: 1px solid var(--header-line);
        border-radius: 18px;
        padding: 24px 24px 20px;
        position: relative;
        overflow: hidden;
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(10,30,15,0.15), 0 10px 26px rgba(10,30,15,0.16);
    }
    .welcome-card::before {
        content: '';
        position: absolute; inset: 0;
        background-image: repeating-linear-gradient(115deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 34px);
        pointer-events: none;
        z-index: 0;
    }
    .welcome-card .wc-top {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 14px; position: relative; z-index: 1;
    }
    .welcome-card .wc-eyebrow {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.68em; letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--accent-soft); margin: 0 0 6px; opacity: 0.9;
    }
    .welcome-card h2 {
        margin: 0 0 4px;
        font-family: 'Fraunces', serif;
        font-weight: 600;
        font-size: 1.36em;
        line-height: 1.18;
        border: none;
        padding: 0;
        color: var(--header-text);
        max-width: 80%;
    }
    .welcome-card p {
        margin: 0;
        color: var(--header-text-muted);
        opacity: 0.72;
        font-size: 0.86em;
    }
    .welcome-card .illustration { display: none; }
    .wc-pulse-badge {
        flex-shrink: 0;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 12px;
        padding: 9px 12px;
        text-align: right;
        backdrop-filter: blur(2px);
    }
    .wc-pulse-badge .wc-rev {
        font-family: 'Fraunces', serif; font-weight: 600;
        color: #f0ead9; font-size: 1.05em; line-height: 1.1; white-space: nowrap;
    }
    .wc-pulse-badge .wc-rev-label {
        font-size: 0.62em; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--accent-soft); margin-top: 2px;
    }

    /* Sparkline "pouls des ventes" — signature du dashboard */
    .wc-sparkline-wrap {
        position: relative; z-index: 1;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid rgba(255,255,255,0.10);
    }
    .wc-sparkline-head {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 6px;
    }
    .wc-sparkline-head span {
        font-size: 0.66em; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--header-text-muted); opacity: 0.6;
    }
    .wc-sparkline-svg { width: 100%; height: 46px; display: block; overflow: visible; }
    .wc-sparkline-svg .spark-fill { fill: url(#sparkGrad); opacity: 0.5; }
    .wc-sparkline-svg .spark-line { fill: none; stroke: var(--accent-soft); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .wc-sparkline-svg .spark-dot { fill: #f0ead9; stroke: var(--accent-soft); stroke-width: 1.5; }
    .wc-sparkline-days {
        display: flex; justify-content: space-between; margin-top: 5px;
        font-family: 'IBM Plex Mono', monospace; font-size: 0.62em;
        color: var(--header-text-muted); opacity: 0.55;
    }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 16px;
    }
    .stat-tile {
        background: linear-gradient(180deg, #ffffff, var(--panel));
        border: 1px solid var(--line);
        border-left: 3px solid var(--tile-accent, var(--accent-dim));
        border-bottom: 3px solid #d8d4c2;
        border-radius: 12px;
        padding: 15px 15px 14px;
        cursor: pointer;
        transition: border-color 0.15s, transform 0.05s, box-shadow 0.15s;
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px rgba(30,30,20,0.07);
    }
    .stat-tile:hover { transform: translateY(-2px); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 10px 22px rgba(30,30,20,0.12); }
    .stat-tile:active { transform: translateY(1px); }
    .stat-tile-row {
        display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .stat-glyph {
        width: 30px; height: 30px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; background: var(--tile-glyph-bg, var(--obsidian-2));
        color: var(--tile-accent, var(--accent-dim));
    }
    .stat-glyph svg { width: 16px; height: 16px; }
    .stat-chevron { width: 15px; height: 15px; flex-shrink: 0; color: var(--line); margin-top: 4px; }
    .stat-value {
        font-family: 'Fraunces', serif;
        font-weight: 600;
        font-size: 1.85em;
        line-height: 1;
        margin: 12px 0 5px;
        color: var(--text);
        font-variant-numeric: tabular-nums;
    }
    .stat-label {
        font-size: 0.74em;
        font-weight: 600;
        color: var(--text);
    }
    .stat-sub { font-size: 0.7em; color: var(--text-muted); margin-top: 1px; }
    .stat-tile.blue { --tile-accent: var(--blue); --tile-glyph-bg: var(--blue-bg); }
    .stat-tile.green { --tile-accent: var(--ok); --tile-glyph-bg: var(--ok-bg); }
    .stat-tile.teal { --tile-accent: var(--teal); --tile-glyph-bg: var(--teal-bg); }
    .stat-tile.red { --tile-accent: var(--danger); --tile-glyph-bg: var(--danger-bg); }

    /* Cartes stat en ligne (icône + texte), utilisées dans l'onglet Finances */
    .stat-tile { display: flex; flex-direction: column; }
    .stat-tile.stat-tile-row-layout { flex-direction: row; align-items: flex-start; gap: 12px; }
    .stat-icon {
        width: 42px; height: 42px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; background: var(--obsidian-2); color: var(--accent-dim);
    }
    .stat-icon svg { width: 20px; height: 20px; }
    .stat-icon-green { background: var(--ok-bg); color: var(--ok); }
    .stat-icon-blue { background: var(--blue-bg); color: var(--blue); }
    .stat-icon-red { background: var(--danger-bg); color: var(--danger); }
    .stat-text { flex: 1; min-width: 0; }
    .stat-text .stat-value { margin: 0 0 3px; font-size: 1.3em; }
    .stat-text .stat-label { display: block; margin-bottom: 2px; }

    .alerts-panel {
        background: linear-gradient(180deg, #ffffff, var(--panel));
        border: 1px solid var(--line);
        border-bottom: 3px solid #d8d4c2;
        border-radius: 14px;
        padding: 18px 18px 8px;
        margin-bottom: 16px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px rgba(30,30,20,0.07);
    }
    .alerts-header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; margin-bottom: 12px;
    }
    .alerts-title {
        font-weight: 700; color: var(--text); font-size: 0.9em;
        display: flex; align-items: center; gap: 8px;
    }
    .alerts-title svg { width: 17px; height: 17px; color: var(--warn); flex-shrink: 0; }
    .pill-btn {
        background: none; border: 1px solid var(--accent-dim); color: var(--accent);
        border-radius: 20px; padding: 6px 14px; font-size: 0.7em; font-weight: 700;
        letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
        white-space: nowrap; font-family: 'Work Sans', sans-serif;
    }
    .pill-btn:hover { background: rgba(34,139,34,0.08); }
    .alert-item {
        display: flex; align-items: center; gap: 12px;
        padding: 11px 0; border-bottom: 1px solid var(--line);
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-avatar {
        width: 40px; height: 40px; border-radius: 9px;
        background: var(--obsidian-2); border: 1px solid var(--line);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; color: var(--text-muted); font-size: 1.05em;
        overflow: hidden;
    }
    .alert-info { flex: 1; min-width: 0; }
    .alert-name { font-weight: 600; color: var(--text); font-size: 0.9em; }
    .alert-expiry { font-size: 0.76em; color: var(--text-muted); margin-top: 2px; }
    .alert-expiry .date-accent { color: var(--accent-soft); font-weight: 600; }
    .days-pill {
        flex-shrink: 0; font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72em; font-weight: 700;
        padding: 5px 11px; border-radius: 20px;
        border: 1px solid transparent;
    }
    .days-pill.warn { background: var(--warn-bg); color: #9a6b0f; border-color: rgba(220,156,26,0.25); }
    .days-pill.danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(221,70,54,0.25); }

    .quick-actions-panel {
        background: linear-gradient(180deg, #ffffff, var(--panel));
        border: 1px solid var(--line);
        border-bottom: 3px solid #d8d4c2;
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px rgba(30,30,20,0.07);
    }
    .quick-actions-panel h3 {
        margin: 0 0 14px;
        font-size: 0.72em;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 700;
    }
    .quick-actions-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    .quick-action {
        background: var(--obsidian-2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 15px 6px 13px;
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        cursor: pointer;
        font-family: 'Work Sans', sans-serif;
        color: var(--text);
        font-size: 0.73em;
        font-weight: 600;
        text-align: center;
        transition: border-color 0.15s, transform 0.05s, background 0.15s;
    }
    .quick-action:hover { border-color: var(--accent-dim); background: var(--panel); }
    .quick-action:active { transform: translateY(1px); }
    .quick-action .qa-icon {
        width: 36px; height: 36px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
    }
    .quick-action .qa-icon svg { width: 18px; height: 18px; }
    .qa-icon-blue { background: var(--blue-bg); color: var(--blue); }
    .qa-icon-green { background: var(--ok-bg); color: var(--ok); }
    .qa-icon-purple { background: var(--purple-bg); color: var(--purple); }
    .qa-icon-gold { background: var(--warn-bg); color: var(--accent); }

    @media (max-width: 480px) {
        .welcome-card h2 { max-width: 100%; font-size: 1.18em; }
        .wc-pulse-badge { padding: 7px 9px; }
        .wc-pulse-badge .wc-rev { font-size: 0.92em; }
        .stat-grid { gap: 9px; }
        .stat-tile { padding: 12px 12px 11px; }
        .stat-glyph { width: 26px; height: 26px; }
        .stat-glyph svg { width: 14px; height: 14px; }
        .stat-value { font-size: 1.4em; margin: 9px 0 3px; }
        .stat-label { font-size: 0.68em; }
        .stat-sub { font-size: 0.64em; }
        .quick-actions-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ---------- Écran de connexion (multi-utilisateur) ---------- */
    #authScreen, #pendingScreen {
        position: fixed; inset: 0; z-index: 500;
        background:
            radial-gradient(ellipse 600px 300px at 50% -10%, rgba(58,168,58,0.14), transparent 65%),
            linear-gradient(180deg, #0a3d22 0%, #0d4527 55%, #0a2416 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
    }
    #authScreen.hidden, #pendingScreen.hidden { display: none; }
    .auth-card {
        width: 100%; max-width: 380px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 32px 26px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .auth-card .auth-mark {
        width: 54px; height: 54px; border-radius: 14px;
        margin: 0 auto 16px;
        background: var(--obsidian-2); border: 1px solid var(--line);
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
    }
    .auth-card .auth-mark img { width: 100%; height: 100%; object-fit: cover; }
    .auth-card h2 {
        font-family: 'Fraunces', serif; font-weight: 600;
        font-size: 1.2em; text-align: center; margin: 0 0 4px; border: none; padding: 0;
        color: var(--text);
    }
    .auth-card .auth-sub {
        text-align: center; color: var(--text-muted); font-size: 0.82em; margin: 0 0 22px;
    }
    .auth-field { margin-bottom: 13px; }
    .auth-field label {
        display: block; font-size: 0.72em; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
    }
    .auth-field input {
        width: 100%; padding: 11px 13px; border-radius: 10px;
        border: 1px solid var(--line); background: var(--panel-2);
        color: var(--text); font-family: 'Work Sans', sans-serif; font-size: 0.92em;
    }
    .auth-field input:focus { outline: none; border-color: var(--accent-dim); }
    .auth-error {
        background: var(--danger-bg); color: var(--danger);
        border-radius: 10px; padding: 9px 12px; font-size: 0.8em;
        margin-bottom: 13px; display: none;
    }
    .auth-error.show { display: block; }
    .auth-submit {
        width: 100%; padding: 12px; border-radius: 10px; border: none;
        background: linear-gradient(135deg, var(--accent-soft), var(--accent));
        color: #f5f0e6; font-weight: 700; font-size: 0.92em; cursor: pointer;
        font-family: 'Work Sans', sans-serif;
    }
    .auth-submit:disabled { opacity: 0.6; cursor: wait; }
    .auth-switch {
        text-align: center; margin-top: 16px; font-size: 0.8em; color: var(--text-muted);
    }
    .auth-switch button {
        background: none; border: none; color: var(--accent-soft); font-weight: 700;
        cursor: pointer; font-family: 'Work Sans', sans-serif; font-size: 1em; padding: 0;
    }
    .auth-offline-note {
        margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
        font-size: 0.72em; color: var(--text-muted); text-align: center; line-height: 1.5;
    }
    .auth-dev-credit {
        margin-top: 10px; font-size: 0.66em; color: var(--text-muted);
        text-align: center; opacity: 0.75; letter-spacing: 0.02em;
    }

    /* ---------- Badge utilisateur + statut sync (header) ---------- */
    .sync-status {
        display: flex; align-items: center; gap: 6px;
        font-size: 0.68em; color: var(--header-text-muted); opacity: 0.75;
    }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); flex-shrink: 0; }
    .sync-dot.online { background: var(--ok); }
    .sync-dot.offline { background: var(--danger); }
    .user-badge {
        display: flex; align-items: center; gap: 8px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px; padding: 5px 12px 5px 5px;
    }
    .user-badge .user-avatar {
        width: 22px; height: 22px; border-radius: 50%;
        background: var(--accent-soft); color: #0a3d22;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.7em; font-weight: 700; flex-shrink: 0;
    }
    .user-badge span { font-size: 0.76em; color: var(--header-text); font-weight: 600; }
    #logoutBtn:hover { background: rgba(221,70,54,0.18); border-color: rgba(221,70,54,0.4); }

    /* ---------- Responsive : mobile-first ---------- */
    @media (max-width: 640px) {
        header { padding: 1.3rem 1rem 1.2rem; }
        header h1 { font-size: 1.25em; }
        header p { font-size: 0.72em; letter-spacing: 0.08em; }
        header .mark { width: 38px; height: 38px; font-size: 1em; }

        .container { padding: 0 10px 30px; margin: 14px auto; }
        .tab-content { padding: 16px 14px; border-radius: 8px; }
        .tab-content h2 { font-size: 1.08em; padding-bottom: 10px; margin-bottom: 14px; }

        .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { padding: 14px 10px; border-radius: 8px; }
        .stat-card h3 { font-size: 1.35em; }
        .stat-card p { font-size: 0.68em; }

        input, select, .btn { font-size: 1em; }
        .btn { padding: 12px 16px; width: 100%; }
        #tab1 > div > .btn, #tab3 .btn { width: auto; }

        /* Tableaux -> cartes empilées */
        table.responsive-table thead { display: none; }
        table.responsive-table, table.responsive-table tbody,
        table.responsive-table tr, table.responsive-table td { display: block; width: 100%; }
        table.responsive-table tr {
            margin-bottom: 10px; border: 1px solid var(--line); border-radius: 10px;
            padding: 10px 14px; background: var(--panel-2);
        }
        table.responsive-table tr.empty-row { border: none; background: none; padding: 0; }
        table.responsive-table tr.empty-row td { display: block; text-align: left; border-bottom: none; }
        table.responsive-table tr.empty-row td::before { content: none; }
        table.responsive-table td {
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding: 8px 0; display: flex; justify-content: space-between;
            align-items: center; gap: 10px; text-align: right;
        }
        table.responsive-table td:last-child { border-bottom: none; }
        table.responsive-table td[data-label]::before {
            content: attr(data-label);
            color: var(--accent); font-size: 0.68em; text-transform: uppercase;
            letter-spacing: 0.05em; font-weight: 700; flex-shrink: 0; text-align: left;
        }
        table.responsive-table td[data-label=""]::before,
        table.responsive-table td:not([data-label])::before { content: none; }

        .caisse-grid { gap: 16px; }
        .suggestion-item { font-size: 0.85em; }
        #addProductForm { padding: 14px !important; }
        #addProductForm > div[style*="flex"] { flex-wrap: wrap; }
    }
    @media (max-width: 360px) {
        .stat-cards { grid-template-columns: 1fr 1fr; }
    }

    /* ---------- Desktop : titre agrandi ---------- */
    @media (min-width: 900px) {
        header h1 { font-size: 3em; font-weight: 700; }
    }

    /* =====================================================
       STYLE 3D AVANCÉ — relief renforcé + tilt interactif
       ===================================================== */
    :root {
        --d3-persp: 900px;
        --d3-shadow-1: 0 1px 0 rgba(255,255,255,0.8) inset;
        --d3-shadow-ambient: 0 2px 4px rgba(20,45,25,0.06), 0 8px 16px rgba(20,45,25,0.07);
        --d3-shadow-lift: 0 14px 30px rgba(15,40,20,0.16), 0 4px 10px rgba(15,40,20,0.10);
        --d3-shadow-press: 0 2px 6px rgba(15,40,20,0.18) inset;
        --d3-rim: 0 0 0 1px rgba(22,193,80,0.10);
    }

    .stat-cards, .browse-products-grid, .sidebar-nav, #reportCards, #commandeCards, #alertsCards {
        perspective: var(--d3-persp);
    }

    .stat-card, .browse-product-card, .fin-panel, .fin-split-item {
        transform-style: preserve-3d;
        will-change: transform;
        position: relative;
    }
    .stat-card {
        box-shadow:
            var(--d3-shadow-1),
            0 1px 2px rgba(255,255,255,0.5),
            var(--d3-shadow-ambient),
            0 1px 0 rgba(216,212,194,0.9);
        border-bottom-width: 4px;
        transform: translateZ(0);
        transition: transform 0.35s cubic-bezier(.16,.85,.3,1.15), box-shadow 0.35s cubic-bezier(.16,.85,.3,1.15);
    }
    .stat-card::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 40%);
        pointer-events: none;
        opacity: 0.9;
        transform: translateZ(1px);
    }
    .stat-card h3, .stat-card p { position: relative; transform: translateZ(18px); }
    .stat-card:hover {
        box-shadow:
            var(--d3-shadow-1),
            var(--d3-shadow-lift),
            var(--d3-rim);
    }

    .browse-product-card {
        box-shadow: var(--d3-shadow-ambient), 0 1px 0 rgba(255,255,255,0.6) inset;
        transform: translateZ(0);
        transition: transform 0.3s cubic-bezier(.16,.85,.3,1.15), box-shadow 0.3s cubic-bezier(.16,.85,.3,1.15), border-color 0.2s;
    }
    .browse-product-card:hover {
        box-shadow: var(--d3-shadow-lift), 0 0 0 1px rgba(34,139,34,0.18);
        z-index: 2;
    }
    .browse-product-card .bpc-img, .browse-product-card .bpc-img-placeholder {
        transform: translateZ(10px);
    }

    .fin-panel:hover {
        box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, var(--d3-shadow-lift);
        transform: translateY(-2px);
    }
    .fin-split-item {
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 10px rgba(20,45,25,0.06);
        transition: transform 0.2s cubic-bezier(.16,.85,.3,1.15), box-shadow 0.2s;
    }
    .fin-split-item:hover { transform: translateY(-3px) translateZ(0); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, var(--d3-shadow-ambient); }

    .btn {
        box-shadow:
            var(--d3-shadow-1),
            0 1px 1px rgba(255,255,255,0.4),
            0 4px 8px rgba(20,45,25,0.10),
            0 1px 0 rgba(0,0,0,0.04);
        transform: translateY(0) translateZ(0);
        transition: transform 0.12s cubic-bezier(.2,.8,.3,1.3), box-shadow 0.16s ease, filter 0.15s, border-bottom-width 0.08s;
    }
    .btn:hover {
        transform: translateY(-2px);
        box-shadow:
            var(--d3-shadow-1),
            0 1px 1px rgba(255,255,255,0.45),
            0 10px 18px rgba(20,45,25,0.16),
            0 2px 4px rgba(20,45,25,0.08);
    }
    .btn:active {
        transform: translateY(2px) scale(0.985);
        box-shadow: var(--d3-shadow-press), 0 1px 2px rgba(20,45,25,0.12);
        border-bottom-width: 1px;
    }
